<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to right, #a18cd1, #fbc2eb, #ff7e5f, #feb47b);
            font-family: Arial, Helvetica, sans-serif;
            color: black;
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            padding: 20px;
            text-align: center;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            background: #ccc;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: black;
            font-size: 12px;
        }
        h1 {
            margin: 10px 0 5px;
            font-size: 24px;
        }
        h2 {
            margin: 5px 0 15px;
            font-size: 18px;
            color: #555;
        }
        p {
            font-size: 14px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="profile-img">Profile Photo</div>
        <h1>John Doe</h1>
        <h2>Computer Science</h2>
        <p>This is a short bio about John Doe. Lorem ipsum dolor sit amet, consectetur adipiscing elit. Quisque sit amet.</p>
    </div>
</body>
</html>
